services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://db:3306/spl_auction_db?createDatabaseIfNotExist=true
      - DB_USER=spl_user
      - DB_PASS=spl_password
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=spl_root_pass
      - MYSQL_DATABASE=spl_auction_db
      - MYSQL_USER=spl_user
      - MYSQL_PASSWORD=spl_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

volumes:
  db_data:
