<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Team - Cricket Auction</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">Cricket Auction</h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="add-team.html">Add Team</a></li>
                <li><a href="team-management.html">Manage Teams</a></li>
                <li><a href="auction.html">Auction</a></li>
                <li><a href="player-registration.html">Register Player</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="form-section">
            <h2>Add New Team</h2>
            <form id="addTeamForm" class="form">
                <div class="form-group">
                    <label for="teamName">Team Name <span class="required">*</span></label>
                    <input type="text" id="teamName" name="teamName" required>
                </div>

                <div class="form-group">
                    <label for="captain">Captain Name <span class="required">*</span></label>
                    <input type="text" id="captain" name="captain" required>
                </div>

                <div class="form-group">
                    <label for="totalBudget">Total Budget <span class="required">*</span></label>
                    <input type="number" id="totalBudget" name="totalBudget" min="0" step="0.01" required>
                </div>

                <h3>Optional - Player Retention</h3>

                <div class="form-group">
                    <label for="playerRetention1">Player Retention 1</label>
                    <input type="text" id="playerRetention1" name="playerRetention1">
                </div>

                <div class="form-group">
                    <label for="playerRetention1Money">Retention 1 Amount</label>
                    <input type="number" id="playerRetention1Money" name="playerRetention1Money" min="0" step="0.01">
                </div>

                <div class="form-group">
                    <label for="playerRetention2">Player Retention 2</label>
                    <input type="text" id="playerRetention2" name="playerRetention2">
                </div>

                <div class="form-group">
                    <label for="playerRetention2Money">Retention 2 Amount</label>
                    <input type="number" id="playerRetention2Money" name="playerRetention2Money" min="0" step="0.01">
                </div>

                <button type="submit" class="btn btn-primary btn-large">Create Team</button>
            </form>

            <div id="message" class="message"></div>
        </div>

        <div class="teams-list-section">
            <h2>Teams</h2>
            <div id="teamsList" class="teams-list">
                <p>Loading teams...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Cricket Auction Management System. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
    <script>
        document.getElementById('addTeamForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                teamName: document.getElementById('teamName').value,
                captain: document.getElementById('captain').value,
                totalBudget: parseFloat(document.getElementById('totalBudget').value),
                playerRetention1: document.getElementById('playerRetention1').value || null,
                playerRetention1Money: document.getElementById('playerRetention1Money').value ?
                    parseFloat(document.getElementById('playerRetention1Money').value) : null,
                playerRetention2: document.getElementById('playerRetention2').value || null,
                playerRetention2Money: document.getElementById('playerRetention2Money').value ?
                    parseFloat(document.getElementById('playerRetention2Money').value) : null
            };

            try {
                const response = await fetch('/api/teams', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    document.getElementById('message').innerHTML =
                        '<p class="success">Team created successfully!</p>';
                    document.getElementById('addTeamForm').reset();
                    loadTeams();
                    setTimeout(() => {
                        document.getElementById('message').innerHTML = '';
                    }, 3000);
                } else {
                    const error = await response.json();
                    document.getElementById('message').innerHTML =
                        '<p class="error">Error: ' + error.message + '</p>';
                }
            } catch (error) {
                document.getElementById('message').innerHTML =
                    '<p class="error">Error: ' + error.message + '</p>';
            }
        });

        async function loadTeams() {
            try {
                const response = await fetch('/api/teams');
                const teams = await response.json();
                const teamsList = document.getElementById('teamsList');

                if (teams.length === 0) {
                    teamsList.innerHTML = '<p>No teams registered yet.</p>';
                    return;
                }

                let html = '<table class="table"><tr><th>Team Name</th><th>Captain</th><th>Budget</th><th>Remaining</th></tr>';
                teams.forEach(team => {
                    html += `<tr>
                        <td>${team.teamName}</td>
                        <td>${team.captain}</td>
                        <td>₹${team.totalBudget.toFixed(2)}</td>
                        <td>₹${team.remainingBudget.toFixed(2)}</td>
                    </tr>`;
                });
                html += '</table>';
                teamsList.innerHTML = html;
            } catch (error) {
                document.getElementById('teamsList').innerHTML = '<p class="error">Error loading teams</p>';
            }
        }

        // Load teams on page load
        loadTeams();
    </script>
</body>
</html>
